<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>OnlyRouter 助手</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%23c6f24e'/><text x='16' y='23' font-size='20' font-weight='bold' text-anchor='middle' fill='%230a0a0a'>O</text></svg>" />
  <meta name="description" content="OnlyRouter AI 助手 — 解答配置、报错、模型选择与 AI 提效，并可一键接入你自己的 Lark/飞书 Bot" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">ONLYROUTER.</span>
      <span class="brand-sub">AI 助手</span>
    </div>
    <div class="tabs" id="tabs">
      <button class="tab active" data-tab="chat">问答助手</button>
      <button class="tab" data-tab="deploy">接入我的 Bot</button>
    </div>
    <a class="topbar-link" href="https://onlyrouter.ai" target="_blank" rel="noopener">前往官网 ↗</a>
  </header>

  <div class="layout">
    <!-- 左：聊天 -->
    <main class="chat pane" id="chat" data-pane="chat">
      <section class="welcome" id="welcome">
        <div class="welcome-badge">● 在线 · OnlyRouter AI 助手</div>
        <h1 class="welcome-title">你好，我是 OnlyRouter 助手 👋</h1>
        <p class="welcome-sub">
          我熟悉 OnlyRouter 的<strong>配置接入、报错排查、模型选择</strong>，也能教你<strong>用 AI 提升工作效率</strong>。
          有问题直接问我，答不上来的我会帮你查。
        </p>

        <div class="cat-grid">
          <div class="cat">
            <div class="cat-head">🔌 配置接入</div>
            <button class="chip" data-q="Codex 怎么接入 OnlyRouter？">Codex 怎么配</button>
            <button class="chip" data-q="Claude Code 怎么接入 OnlyRouter？用哪个模型？">Claude Code 怎么配</button>
          </div>
          <div class="cat">
            <div class="cat-head">🐛 报错排查</div>
            <button class="chip" data-q="调用模型报错 401 是什么原因，怎么解决？">报错 401 怎么办</button>
            <button class="chip" data-q="报错 400 not configured for responses protocol 是什么意思？">报错 400 协议</button>
          </div>
          <div class="cat">
            <div class="cat-head">💰 模型选择</div>
            <button class="chip" data-q="OnlyRouter 上有哪些模型，日常用哪个最便宜？">哪个模型最便宜</button>
            <button class="chip" data-q="写代码用哪个模型好？">写代码用啥模型</button>
          </div>
          <div class="cat">
            <div class="cat-head">🚀 AI 提效</div>
            <button class="chip" data-q="怎么用 AI 帮我整理会议纪要？">整理会议纪要</button>
            <button class="chip" data-q="怎么用 AI 批量处理 Excel 表格数据？">处理表格数据</button>
          </div>
        </div>

        <p class="welcome-tips">💡 小提示：问题描述得越具体越好；报错可以直接发<strong>截图</strong>；支持<strong>追问</strong>，聊不明白可以接着说。</p>
      </section>
      <div class="messages" id="messages"></div>
      <div class="composer">
        <div class="img-preview" id="imgPreview" hidden></div>
        <div class="composer-inner">
          <button id="attach" class="attach-btn" aria-label="发送图片" title="发送图片">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19 5v14H5V5h14m0-2H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2zm-4.5 8.5l-2.5 3.01L10.5 12 7 16h10l-2.5-3.5z"/></svg>
          </button>
          <input type="file" id="fileInput" accept="image/*" hidden />
          <textarea id="input" rows="1" placeholder="问点什么…比如「codex 报错 401 怎么办」，也可以发报错截图（Enter 发送）"></textarea>
          <button id="send" class="send-btn" aria-label="发送">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M3.4 20.4l17.45-7.48a1 1 0 000-1.84L3.4 3.6a.993.993 0 00-1.39.91L2 9.12c0 .5.37.93.87.99L17 12 2.87 13.88c-.5.07-.87.5-.87 1l.01 4.61c0 .68.71 1.15 1.39.91z"/></svg>
          </button>
        </div>
        <p class="composer-hint">AI 生成内容仅供参考，重要操作请以 onlyrouter.ai 官方文档为准。</p>
      </div>
    </main>

    <!-- 右：接入面板（内容由 deploy.html 片段填充，见下方 section） -->
    <aside class="deploy pane" id="deploy" data-pane="deploy" hidden></aside>
  </div>

  <script src="/app.js"></script>
</body>
</html>
