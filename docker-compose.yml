services:
  bot:
    build: .
    container_name: onlyrouter-lark-bot
    restart: always
    env_file: .env
    # 阿里云 ECS 内网 DNS(100.100.x)对容器 DNS 转发不稳，导致容器内解析
    # open.larksuite.com 失败(EAI_AGAIN)。直接给容器指定公共 DNS 解决。
    dns:
      - 223.5.5.5
      - 223.6.6.6
    volumes:
      - ./data:/app/data
      # 挂载知识库目录，改文档后重启容器即可生效，无需重建镜像
      - ./knowledge:/app/knowledge:ro
